name: Bug report
description: Report a reproducible problem in Instatic.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, API keys, private URLs, or security exploit details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest sequence that reproduces the issue.
      placeholder: |
        1. Start Instatic with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.0.1 or commit SHA
    validations:
      required: false
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Local dev with Bun
        - Docker Compose with SQLite
        - Docker Compose with Postgres
        - Railway
        - Render
        - Other
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output with secrets redacted.
      render: shell
    validations:
      required: false
