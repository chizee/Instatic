<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Builder</title>
    <style data-initial-loader>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #000;
      }

      .pb-initial-loading {
        display: grid;
        min-height: 100vh;
        place-items: center;
        overflow: hidden;
        background: #000;
        color: #ededed;
      }

      .banter-loader {
        position: relative;
        width: 72px;
        height: 72px;
      }

      .banter-loader__box {
        float: left;
        position: relative;
        width: 20px;
        height: 20px;
        margin-right: 6px;
      }

      .banter-loader__box:before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: #fff;
      }

      .banter-loader__box:nth-child(3n) {
        margin-right: 0;
        margin-bottom: 6px;
      }

      .banter-loader__box:nth-child(1):before,
      .banter-loader__box:nth-child(4):before {
        margin-left: 26px;
      }

      .banter-loader__box:nth-child(3):before {
        margin-top: 52px;
      }

      .banter-loader__box:last-child {
        margin-bottom: 0;
      }

      @keyframes banter-loader-moveBox-1 {
        9.0909090909% {
          transform: translate(-26px, 0);
        }
        18.1818181818% {
          transform: translate(0px, 0);
        }
        27.2727272727% {
          transform: translate(0px, 0);
        }
        36.3636363636% {
          transform: translate(26px, 0);
        }
        45.4545454545% {
          transform: translate(26px, 26px);
        }
        54.5454545455% {
          transform: translate(26px, 26px);
        }
        63.6363636364% {
          transform: translate(26px, 26px);
        }
        72.7272727273% {
          transform: translate(26px, 0px);
        }
        81.8181818182% {
          transform: translate(0px, 0px);
        }
        90.9090909091% {
          transform: translate(-26px, 0px);
        }
        100% {
          transform: translate(0px, 0px);
        }
      }

      .banter-loader__box:nth-child(1) {
        animation: banter-loader-moveBox-1 4s infinite;
      }
